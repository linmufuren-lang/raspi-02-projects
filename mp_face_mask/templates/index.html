<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Face Mask</title>
    <style>
        body { text-align: center; background-color: #222; color: white; font-family: sans-serif; }
        h1 { margin-top: 20px; font-size: 1.4rem; letter-spacing: 1px; }
        #controls { margin: 14px auto; display: flex; justify-content: center; gap: 12px; }
        .btn {
            padding: 10px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid #555;
            border-radius: 8px;
            background: #333;
            color: #ccc;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn:hover { background: #555; }
        .btn.active { background: #1a7fc1; color: #fff; border-color: #1a7fc1; }
        #video_feed { border: 2px solid #555; max-width: 100%; }
    </style>
</head>
<body>
    <h1>Face Mask Live</h1>
    <div id="controls">
        {% for s in styles %}
        <button class="btn {% if s == style %}active{% endif %}"
                onclick="setStyle('{{ s }}')">{{ s }}</button>
        {% endfor %}
    </div>
    <div>
        <img id="video_feed" src="/video_feed?style={{ style }}" width="640" height="480">
    </div>

    <script>
        function setStyle(s) {
            document.getElementById('video_feed').src = '/video_feed?style=' + s;
            document.querySelectorAll('.btn').forEach(b => {
                b.classList.toggle('active', b.textContent === s);
            });
        }
    </script>
</body>
</html>
